apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

// ── Build Guard: Require server.url in Capacitor config ──────────────────────
// Prevents building a white-screen APK when cap sync was run without
// CAPACITOR_SERVER_URL set. This architecture uses a live VPS server —
// there is no static bundle to fall back to.
//
// To fix: set the env var, then re-sync before building:
//   $env:CAPACITOR_SERVER_URL = "http://91.98.151.10:3001"
//   npx cap sync android
// ─────────────────────────────────────────────────────────────────────────────
task checkCapacitorServerUrl {
    doFirst {
        def configFile = new File("${projectDir}/src/main/assets/capacitor.config.json")
        if (!configFile.exists()) {
            throw new RuntimeException(
                "\n\nBUILD GUARD: capacitor.config.json not found.\n" +
                "Run: \$env:CAPACITOR_SERVER_URL='http://91.98.151.10:3001'; npx cap sync android\n"
            )
        }
        def config = new groovy.json.JsonSlurper().parseText(configFile.text)
        def serverUrl = config?.server?.url
        if (!serverUrl || serverUrl.toString().trim().isEmpty()) {
            throw new RuntimeException(
                "\n\n" +
                "BUILD GUARD: server.url missing from capacitor.config.json\n" +
                "The APK will show a white screen without a server URL.\n\n" +
                "Fix:\n" +
                "  \$env:CAPACITOR_SERVER_URL = 'http://91.98.151.10:3001'\n" +
                "  npx cap sync android\n" +
                "  .\\gradlew.bat assembleDebug\n"
            )
        }
        logger.lifecycle("BUILD GUARD: server.url = ${serverUrl}  ✓")
    }
}
preBuild.dependsOn checkCapacitorServerUrl

// Load release signing credentials from key.properties (not committed to git)
def keystorePropertiesFile = rootProject.file('key.properties')
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.fixitpro.pos"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.fixitpro.pos"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 2
        versionName "1.1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    flavorDimensions "env"
    productFlavors {
        // DEV flavor — points to LAN Next.js server, installs alongside PROD
        dev {
            dimension "env"
            applicationId "com.fixitpro.dev"
            versionNameSuffix "-dev"
        }
        // PROD flavor — SUNMI POS app (stock, sales, print receipts)
        prod {
            dimension "env"
            applicationId "com.fixitpro.pos"
        }
        // STAFF flavor — staff/owner mobile app (repairs, chat, profile)
        staff {
            dimension "env"
            applicationId "com.fixitpro.staff"
            versionNameSuffix "-staff"
        }
    }

    signingConfigs {
        if (keystorePropertiesFile.exists()) {
            release {
                keyAlias     keystoreProperties['keyAlias']
                keyPassword  keystoreProperties['keyPassword']
                storeFile    file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    }
    buildTypes {
        release {
            if (keystorePropertiesFile.exists()) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }

    // Kotlin source sets alongside Java
    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    buildFeatures {
        aidl = true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    kotlinOptions {
        jvmTarget = '21'
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.24"
    // ZXing embedded barcode scanner (no external app required)
    implementation('com.journeyapps:zxing-android-embedded:4.3.0') { transitive = false }
    implementation 'com.google.zxing:core:3.5.2'
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
